<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambiar contraseña — GRC Tool</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-brand">
      <span class="login-brand-icon">🔐</span>
      <h1 class="login-brand-name">GRC Tool</h1>
      <p class="login-brand-sub">Seguridad de cuenta</p>
    </div>

    <div class="login-card">
      <h2 class="login-title">Cambiar contraseña</h2>
      <p style="font-size:13px;color:#64748b;margin-bottom:20px;text-align:center">
        Por seguridad, debés establecer una nueva contraseña antes de continuar.
      </p>

      <form id="cp-form">
        <div class="login-field">
          <label for="cp-pass">Nueva contraseña <small style="color:#94a3b8">(mín. 8 caracteres)</small></label>
          <input type="password" id="cp-pass" placeholder="••••••••" autocomplete="new-password" autofocus />
        </div>
        <div class="login-field">
          <label for="cp-pass2">Confirmar contraseña</label>
          <input type="password" id="cp-pass2" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div id="cp-error" class="login-error hidden">Error.</div>
        <button type="submit" class="btn btn-primary btn-login" id="btn-cp">
          Guardar y continuar
        </button>
      </form>
    </div>
  </div>

<script>
// Verificar que hay sesión activa; si no, redirigir al login
fetch("/api/me").then(r => {
  if (!r.ok) window.location.href = "/login";
  return r.json();
}).then(user => {
  // Si ya no necesita cambiar, ir a home
  if (!user.debe_cambiar_password) window.location.href = "/";
}).catch(() => window.location.href = "/login");

document.getElementById("cp-form").addEventListener("submit", async e => {
  e.preventDefault();
  const btn   = document.getElementById("btn-cp");
  const err   = document.getElementById("cp-error");
  const pass  = document.getElementById("cp-pass").value;
  const pass2 = document.getElementById("cp-pass2").value;
  err.classList.add("hidden");

  if (pass !== pass2) {
    err.textContent = "Las contraseñas no coinciden.";
    err.classList.remove("hidden");
    return;
  }
  if (pass.length < 8) {
    err.textContent = "La contraseña debe tener al menos 8 caracteres.";
    err.classList.remove("hidden");
    return;
  }

  btn.disabled = true; btn.textContent = "Guardando…";
  try {
    const resp = await fetch("/api/change-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pass }),
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
      window.location.href = "/";
    } else {
      err.textContent = data.error || "Error al cambiar la contraseña.";
      err.classList.remove("hidden");
    }
  } catch {
    err.textContent = "Error de conexión.";
    err.classList.remove("hidden");
  } finally {
    btn.disabled = false; btn.textContent = "Guardar y continuar";
  }
});
</script>
</body>
</html>

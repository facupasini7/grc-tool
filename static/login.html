<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — GRC Tool</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">

  <div class="login-wrap">

    <div class="login-brand">
      <span class="login-brand-icon">🔐</span>
      <h1 class="login-brand-name">GRC Tool</h1>
      <p class="login-brand-sub">Análisis de Brechas · ISO 27001 · BCRA · PCI DSS</p>
    </div>

    <div class="login-card">
      <h2 class="login-title">Iniciar sesión</h2>

      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label for="inp-user">Usuario</label>
          <input
            type="text" id="inp-user" name="username"
            placeholder="admin" autocomplete="username"
            autofocus
          />
        </div>
        <div class="login-field">
          <label for="inp-pass">Contraseña</label>
          <input
            type="password" id="inp-pass" name="password"
            placeholder="••••••••" autocomplete="current-password"
          />
        </div>

        <div id="login-error" class="login-error hidden">
          Usuario o contraseña incorrectos.
        </div>

        <button type="submit" class="btn btn-primary btn-login" id="btn-login">
          Iniciar sesión
        </button>
      </form>

      <div class="login-links">
        <a href="/forgot-password" class="login-link">¿Olvidaste tu contraseña?</a>
        <a href="/register" class="login-link">Registrarse</a>
      </div>

      <div class="login-hint">
        <span class="login-hint-label">Credenciales por defecto</span>
        <span class="login-hint-creds">
          <code>admin</code> / <code>Admin1234!</code>
        </span>
      </div>
    </div>

  </div>

<script>
document.getElementById("login-form").addEventListener("submit", async e => {
  e.preventDefault();
  const btn   = document.getElementById("btn-login");
  const err   = document.getElementById("login-error");
  const user  = document.getElementById("inp-user").value.trim();
  const pass  = document.getElementById("inp-pass").value;

  err.classList.add("hidden");
  btn.disabled    = true;
  btn.textContent = "Ingresando…";

  try {
    const resp = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass }),
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
      window.location.href = data.debe_cambiar_password ? "/change-password" : "/";
    } else {
      err.textContent = data.error || "Error al iniciar sesión.";
      err.classList.remove("hidden");
    }
  } catch {
    err.textContent = "Error de conexión con el servidor.";
    err.classList.remove("hidden");
  } finally {
    btn.disabled    = false;
    btn.textContent = "Iniciar sesión";
  }
});

// Enter en cualquier campo envía el form
document.getElementById("inp-user").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("inp-pass").focus();
});
</script>
</body>
</html>

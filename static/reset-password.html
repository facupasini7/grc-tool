<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña — GRC Tool</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-brand">
      <span class="login-brand-icon">🔐</span>
      <h1 class="login-brand-name">GRC Tool</h1>
      <p class="login-brand-sub">Restablecer contraseña</p>
    </div>

    <div class="login-card">
      <h2 class="login-title">Nueva contraseña</h2>

      <div id="rp-invalid" class="hidden" style="text-align:center;padding:24px 0;color:#dc2626">
        <div style="font-size:36px;margin-bottom:12px">❌</div>
        <div style="font-weight:700">Link inválido o expirado</div>
        <div style="font-size:13px;margin-top:8px;margin-bottom:20px;color:#64748b">
          El link de recuperación expiró o ya fue utilizado.
        </div>
        <a href="/forgot-password" class="login-link">Solicitar nuevo link</a>
      </div>

      <div id="rp-success" class="hidden" style="text-align:center;padding:24px 0">
        <div style="font-size:36px;margin-bottom:12px">✅</div>
        <div style="font-weight:700;margin-bottom:8px">Contraseña actualizada</div>
        <a href="/login" class="btn btn-primary" style="display:inline-block;text-decoration:none">
          Ir al login
        </a>
      </div>

      <form id="rp-form">
        <div class="login-field">
          <label for="rp-pass">Nueva contraseña <small style="color:#94a3b8">(mín. 8 caracteres)</small></label>
          <input type="password" id="rp-pass" placeholder="••••••••" autocomplete="new-password" autofocus />
        </div>
        <div class="login-field">
          <label for="rp-pass2">Confirmar contraseña</label>
          <input type="password" id="rp-pass2" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div id="rp-error" class="login-error hidden">Error.</div>
        <button type="submit" class="btn btn-primary btn-login" id="btn-rp">
          Guardar contraseña
        </button>
      </form>
    </div>
  </div>

<script>
const token = new URLSearchParams(location.search).get("token");
if (!token) {
  document.getElementById("rp-form").classList.add("hidden");
  document.getElementById("rp-invalid").classList.remove("hidden");
}

document.getElementById("rp-form")?.addEventListener("submit", async e => {
  e.preventDefault();
  const btn  = document.getElementById("btn-rp");
  const err  = document.getElementById("rp-error");
  const pass  = document.getElementById("rp-pass").value;
  const pass2 = document.getElementById("rp-pass2").value;
  err.classList.add("hidden");

  if (pass !== pass2) {
    err.textContent = "Las contraseñas no coinciden.";
    err.classList.remove("hidden");
    return;
  }
  if (pass.length < 8) {
    err.textContent = "La contraseña debe tener al menos 8 caracteres.";
    err.classList.remove("hidden");
    return;
  }

  btn.disabled = true; btn.textContent = "Guardando…";
  try {
    const resp = await fetch("/api/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password: pass }),
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
      document.getElementById("rp-form").classList.add("hidden");
      document.getElementById("rp-success").classList.remove("hidden");
    } else {
      err.textContent = data.error || "Error al restablecer.";
      err.classList.remove("hidden");
      if (data.error?.includes("expiró")) {
        document.getElementById("rp-form").classList.add("hidden");
        document.getElementById("rp-invalid").classList.remove("hidden");
      }
    }
  } catch {
    err.textContent = "Error de conexión.";
    err.classList.remove("hidden");
  } finally {
    btn.disabled = false; btn.textContent = "Guardar contraseña";
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="light" data-density="default">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NormaLab — GRC Proof of Concept</title>

  <!-- Geist fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- Design system CSS -->
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

  <!-- Babel standalone — transpiles type="text/babel" scripts in-browser -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- API client (plain JS, no JSX needed) -->
  <script src="/static/js/api.js"></script>

  <!-- ── JSX modules loaded in dependency order ─────────────────── -->

  <!-- 1. Icon set -->
  <script type="text/babel" src="/static/js/icons.jsx"></script>

  <!-- 2. Shared UI components + hooks (Badge, Modal, Spinner, useApi, formatters…) -->
  <script type="text/babel" src="/static/js/components.jsx"></script>

  <!-- 3. Tweaks panel (theme / density / accent) -->
  <script type="text/babel" src="/static/js/tweaks-panel.jsx"></script>

  <!-- 4. Screens — core -->
  <script type="text/babel" src="/static/js/screen-home.jsx"></script>
  <script type="text/babel" src="/static/js/screen-evaluacion.jsx"></script>
  <script type="text/babel" src="/static/js/screen-hallazgos.jsx"></script>
  <script type="text/babel" src="/static/js/screen-resultados.jsx"></script>
  <script type="text/babel" src="/static/js/screen-cobertura.jsx"></script>
  <script type="text/babel" src="/static/js/screen-remediacion.jsx"></script>
  <script type="text/babel" src="/static/js/screen-misc.jsx"></script>

  <!-- 4b. Screens — nuevas (GRC avanzado) -->
  <script type="text/babel" src="/static/js/screen-riesgos.jsx"></script>
  <script type="text/babel" src="/static/js/screen-soa.jsx"></script>
  <script type="text/babel" src="/static/js/screen-deadlines.jsx"></script>
  <script type="text/babel" src="/static/js/screen-tprm.jsx"></script>

  <!-- 4c. Screens — seguridad (usuarios + roles + auditoría) -->
  <script type="text/babel" src="/static/js/screen-seguridad.jsx"></script>

  <!-- 5. App entry point — mounts React tree into #root -->
  <script type="text/babel" src="/static/js/app.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — GRC Tool</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-brand">
      <span class="login-brand-icon">🔐</span>
      <h1 class="login-brand-name">GRC Tool</h1>
      <p class="login-brand-sub">Recuperación de contraseña</p>
    </div>

    <div class="login-card">
      <h2 class="login-title">¿Olvidaste tu contraseña?</h2>

      <div id="fp-result" class="hidden" style="text-align:center;padding:24px 0">
        <div style="font-size:36px;margin-bottom:12px" id="fp-icon">📧</div>
        <div style="font-weight:700;margin-bottom:8px" id="fp-msg">Revisá tu email</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:8px" id="fp-sub"></div>
        <div id="fp-link-box" class="hidden" style="margin:16px 0">
          <div style="font-size:12px;color:#64748b;margin-bottom:6px">
            No hay email configurado. Copiá este link y envialo al usuario:
          </div>
          <input id="fp-link-input" type="text" readonly
            style="width:100%;padding:8px;font-size:11px;font-family:monospace;border:1px solid #e2e8f0;border-radius:6px;background:#f8f9fa" />
          <button onclick="copyLink()" class="btn btn-outline btn-sm" style="margin-top:8px">
            📋 Copiar link
          </button>
        </div>
        <a href="/login" class="login-link">Volver al login</a>
      </div>

      <form id="fp-form">
        <p style="font-size:13px;color:#64748b;margin-bottom:16px">
          Ingresá tu email o usuario. Si existe, recibirás un link para restablecer tu contraseña.
        </p>
        <div class="login-field">
          <label for="fp-id">Email o usuario</label>
          <input type="text" id="fp-id" placeholder="tu@empresa.com o tu_usuario" autofocus />
        </div>

        <div id="fp-error" class="login-error hidden">Error.</div>

        <button type="submit" class="btn btn-primary btn-login" id="btn-fp">
          Enviar link de recuperación
        </button>
      </form>

      <div class="login-links">
        <a href="/login" class="login-link">Volver al login</a>
      </div>
    </div>
  </div>

<script>
document.getElementById("fp-form").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = document.getElementById("btn-fp");
  const err = document.getElementById("fp-error");
  err.classList.add("hidden");
  btn.disabled = true; btn.textContent = "Enviando…";

  const identifier = document.getElementById("fp-id").value.trim();
  try {
    const resp = await fetch("/api/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email_or_username: identifier }),
    });
    const data = await resp.json();

    document.getElementById("fp-form").classList.add("hidden");
    document.getElementById("fp-result").classList.remove("hidden");

    if (data.email_sent) {
      document.getElementById("fp-icon").textContent = "📧";
      document.getElementById("fp-msg").textContent = "Email enviado";
      document.getElementById("fp-sub").textContent = "Revisá tu bandeja de entrada. El link es válido por 2 horas.";
    } else if (data.reset_url) {
      document.getElementById("fp-icon").textContent = "🔗";
      document.getElementById("fp-msg").textContent = "Link generado";
      document.getElementById("fp-sub").textContent = "El sistema no tiene email configurado. Copiá el link:";
      const box = document.getElementById("fp-link-box");
      box.classList.remove("hidden");
      document.getElementById("fp-link-input").value = data.reset_url;
    } else {
      document.getElementById("fp-icon").textContent = "✅";
      document.getElementById("fp-msg").textContent = "Solicitud recibida";
      document.getElementById("fp-sub").textContent = "Si el usuario existe, recibirá instrucciones.";
    }
  } catch {
    err.textContent = "Error de conexión.";
    err.classList.remove("hidden");
  } finally {
    btn.disabled = false; btn.textContent = "Enviar link de recuperación";
  }
});

function copyLink() {
  const inp = document.getElementById("fp-link-input");
  inp.select();
  navigator.clipboard?.writeText(inp.value) || document.execCommand("copy");
  event.target.textContent = "✅ Copiado";
  setTimeout(() => event.target.textContent = "📋 Copiar link", 2000);
}
</script>
</body>
</html>
